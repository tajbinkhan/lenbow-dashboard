<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1, viewport-fit=cover"
		/>
		<meta name="theme-color" content="#6d28d9" />
		<title>Lenbow Offline</title>
		<style>
			:root {
				color-scheme: light;
				font-family:
					"Plus Jakarta Sans",
					"Segoe UI",
					sans-serif;
				background: #ffffff;
				color: #101828;
			}

			* {
				box-sizing: border-box;
			}

			body {
				margin: 0;
				min-height: 100vh;
				display: grid;
				place-items: center;
				padding: 24px;
				background:
					radial-gradient(circle at top, rgba(109, 40, 217, 0.14), transparent 42%),
					linear-gradient(180deg, #ffffff 0%, #f8f5ff 100%);
			}

			main {
				width: min(100%, 520px);
				background: rgba(255, 255, 255, 0.92);
				border: 1px solid rgba(109, 40, 217, 0.12);
				border-radius: 28px;
				padding: 32px;
				box-shadow: 0 24px 80px rgba(17, 24, 39, 0.12);
				backdrop-filter: blur(14px);
			}

			.badge {
				width: 56px;
				height: 56px;
				border-radius: 18px;
				display: grid;
				place-items: center;
				background: rgba(109, 40, 217, 0.1);
				color: #6d28d9;
				font-size: 28px;
			}

			h1 {
				margin: 20px 0 12px;
				font-size: clamp(2rem, 6vw, 2.6rem);
				line-height: 1.1;
			}

			p {
				margin: 0;
				color: #475467;
				font-size: 1rem;
				line-height: 1.7;
			}

			.note {
				margin-top: 24px;
				padding: 16px 18px;
				border-radius: 18px;
				border: 1px solid rgba(71, 84, 103, 0.12);
				background: rgba(248, 250, 252, 0.9);
			}

			.actions {
				display: flex;
				flex-wrap: wrap;
				gap: 12px;
				margin-top: 28px;
			}

			a,
			button {
				appearance: none;
				border: 0;
				cursor: pointer;
				border-radius: 14px;
				padding: 12px 16px;
				font: inherit;
				text-decoration: none;
				transition:
					transform 160ms ease,
					opacity 160ms ease;
			}

			a:hover,
			button:hover {
				transform: translateY(-1px);
				opacity: 0.96;
			}

			.primary {
				background: #6d28d9;
				color: #ffffff;
			}

			.secondary {
				background: #ffffff;
				color: #101828;
				border: 1px solid rgba(71, 84, 103, 0.18);
			}
		</style>
	</head>
	<body>
		<main>
			<div class="badge" aria-hidden="true">L</div>
			<h1>You're offline right now</h1>
			<p>
				Lenbow's cached interface can still open, but live account, request, and
				transaction data need an internet connection before they can refresh.
			</p>
			<div class="note">
				Reconnect to keep working with current loan data, then reload the app for the latest
				updates.
			</div>
			<div class="actions">
				<a class="primary" href="/">Open Lenbow</a>
				<button class="secondary" type="button" onclick="window.location.reload()">
					Try Again
				</button>
			</div>
		</main>
	</body>
</html>
